name: Day完了レポート
description: 当日の完了状況とブロッカーを報告する
title: "DayXX 完了レポート - <name>"
labels:
  - day-report
body:
  - type: input
    id: day
    attributes:
      label: Day
      description: 例: Day05
      placeholder: Day05
    validations:
      required: true

  - type: input
    id: member
    attributes:
      label: 担当者
      placeholder: 名前
    validations:
      required: true

  - type: input
    id: pr_url
    attributes:
      label: PR URL
      placeholder: https://github.com/SHU-T0/spec-ai-training/pull/123
    validations:
      required: true

  - type: input
    id: slack_url
    attributes:
      label: Slack通知URL
      placeholder: https://...
    validations:
      required: true

  - type: input
    id: quiz_score
    attributes:
      label: クイズスコア
      description: 最終完了には100点が必須
      placeholder: 100
    validations:
      required: true

  - type: textarea
    id: outputs
    attributes:
      label: 成果物パス
      description: 当日作成したファイルを列挙
      placeholder: |
        training/day-xx/file1.md
        training/day-xx/file2.md
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: 完了ステータス
      options:
        - 暫定完了（PR作成、クイズ100、レビュー待ち）
        - 最終完了（merge済み）
        - ブロック中
    validations:
      required: true

  - type: textarea
    id: blockers
    attributes:
      label: ブロッカー / 補足
      placeholder: ブロッカーがあれば記載
